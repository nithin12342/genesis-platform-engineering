# Genesis Platform Engineering - ArgoCD Application Definitions
# GitOps Deployment Configurations

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: genesis-platform
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/dulux-tech/genesis-platform-engineering.git
    targetRevision: main
    path: configs/argocd
  destination:
    server: https://kubernetes.default.svc
    namespace: platform
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: backstage
  namespace: argocd
spec:
  project: platform
  source:
    repoURL: https://github.com/dulux-tech/backstage.git
    targetRevision: main
    path: .
  destination:
    server: https://kubernetes.default.svc
    namespace: backstage
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ingress-nginx
  namespace: argocd
spec:
  project: platform
  source:
    repoURL: https://github.com/dulux-tech/ingress-nginx.git
    targetRevision: main
    chart: ingress-nginx
    helm:
      version: v4.7.0
  destination:
    server: https://kubernetes.default.svc
    namespace: ingress-nginx
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager
  namespace: argocd
spec:
  project: platform
  source:
    repoURL: https://github.com/dulux-tech/cert-manager.git
    targetRevision: main
    chart: cert-manager
    helm:
      version: v1.13.0
      parameters:
        - name: installCRDs
          value: 'true'
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: service-templates
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          - service: order-service
            namespace: orders
          - service: payment-service
            namespace: payments
          - service: user-service
            namespace: users
          - service: notification-service
            namespace: notifications
  template:
    metadata:
      name: '{{service}}'
      namespace: argocd
    spec:
      project: default
      source:
        repoURL: https://github.com/dulux-tech/service-templates.git
        targetRevision: main
        path: '{{service}}'
        helm:
          valueFiles:
            - values.yaml
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{namespace}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
