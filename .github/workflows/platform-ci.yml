name: Platform CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint YAML
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: configs/
          strict: true

      - name: Validate Kubernetes manifests
        uses: bitnami/kubectl-action@main
        with:
          command: |
            kubectl apply --dry-run=client -f configs/argocd-applications.yaml

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: .
          format: json
          output: trivy-results.json

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: configs/
          output_format: json
          output_file_path: checkov-results.json

  test-templates:
    name: Test Service Templates
    runs-on: ubuntu-latest
    strategy:
      matrix:
        template: [go-service, python-service, node-service, java-service]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Test Go template
        if: matrix.template == 'go-service'
        run: |
          cd /tmp
          SERVICE_NAME=test-service TEMPLATE=go-service bash ${{ github.workspace }}/scripts/create-app.sh
          cd test-service
          go build -o /dev/null .

      - name: Test Python template
        if: matrix.template == 'python-service'
        run: |
          cd /tmp
          SERVICE_NAME=test-service TEMPLATE=python-service bash ${{ github.workspace }}/scripts/create-app.sh
          python3 -m py_compile test-service/main.py

      - name: Test Node template
        if: matrix.template == 'node-service'
        run: |
          cd /tmp
          SERVICE_NAME=test-service TEMPLATE=node-service bash ${{ github.workspace }}/scripts/create-app.sh
          node --check test-service/index.js

  deploy-platform:
    name: Deploy Platform
    runs-on: ubuntu-latest
    needs: [validate, security-scan, test-templates]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to ArgoCD
        env:
          ARGOCD_TOKEN: ${{ secrets.ARGOCD_TOKEN }}
          ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
        run: |
          argocd login $ARGOCD_SERVER --token $ARGOCD_TOKEN --insecure
          argocd app sync genesis-platform --timeout 300

  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [deploy-platform]
    if: always()
    steps:
      - name: Send notification
        run: |
          echo "Deployment completed"
